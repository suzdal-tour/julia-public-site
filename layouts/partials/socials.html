{{ with .Site.Data.socials }}
<ul class="icons">
    {{ range . }}
    <li>
        <a target="_blank" href="{{ .href }}" class="icon style2 brands fa-{{ lower .name }}" aria-label="{{ replace (i18n `aria_label_socials`) `{social}` .name }}"><span class="label">{{ .name }}</span></a>
    </li>
    {{ end }}
</ul>
{{ end }}
